services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ventafacil_user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: ventafacil_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ventafacil_user -d ventafacil_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://ventafacil_user:123@postgres:5432/ventafacil_dev
      REDIS_URL: redis://redis:6379/0
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_ENV: local
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000
      OPENFOODFACTS_BASE_URL: https://world.openfoodfacts.org/api/v2
      OPENFOODFACTS_TIMEOUT: 5000
      IMAGES_DIR: /app/images
      LOG_DIR: /app/logs
      LOG_LEVEL: INFO
      LOG_RETENTION_DAYS: 14
      LOG_HTTP_ACCESS: "false"
      DB_ECHO: "false"
      SEED_DEMO_DATA: "true"
    ports:
      - "8000:8000"
    volumes:
      - product_images:/app/images
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BUSINESS_ID: 1
        VITE_STORE_ID: 1
        VITE_API_BASE_URL: /api/v1
        VITE_IMAGE_BASE_URL: ""
        VITE_DEV_PROXY_TARGET: http://backend:8000
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  product_images:
